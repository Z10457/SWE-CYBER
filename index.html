<!DOCTYPE html>
<html lang="en">
<head>
    <title>Data Breach Checker</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a8fdc, #7b5dc9);
        }

        /* Top right button */
        .top-btn {
            position: absolute;
            top: 20px;
            right: 30px;
        }

        .top-btn button {
            padding: 10px 18px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
        }

        .top-btn button:hover {
            background: rgba(255,255,255,0.4);
        }

        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            color: white;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
        }

        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            text-align: center;
            background: #f1f1f1;
            color: black;
        }

        input::placeholder {
            color: #666;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: black;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }

        /* Popup background */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        /* Popup box */
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            position: relative;
        }

        .modal-content input {
            width: 90%;
            margin-top: 10px;
            background: #f3f4f6;
            border: 1px solid #ddd;
        }

        /* Close button */
        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 22px;
            cursor: pointer;
            color: black;
        }
    </style>
</head>

<body>

    <!-- Top button -->
    <div class="top-btn">
        <button onclick="openModal()">Sign up for alerts</button>
    </div>

    <!-- Main card -->
    <div class="container">
        <h1>Check if your data was breached</h1>

        <div class="form">
            <input type="text" placeholder="Enter your email">
            <button onclick="checkEmail()">Search</button>
        </div>

        <div id="result">
            Results will appear here
        </div>
    </div>

    <!-- Popup -->
    <div class="modal" id="modal" onclick="outsideClick(event)">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>

            <h3>Sign up for breach alerts</h3>
            <p>Get notified if your data appears in future breaches.</p>

            <input type="email" placeholder="Enter your email">
            <br><br>
            <button onclick="signup()">Sign up</button>
        </div>
    </div>

    <script>
        function checkEmail() {
            document.getElementById("result").innerText =
                "No breaches found";
        }

        function openModal() {
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        function signup() {
            alert("You are now signed up for alerts");
            closeModal();
        }

        function outsideClick(event) {
            if (event.target.id === "modal") {
                closeModal();
            }
        }
    </script>

</body>
</html>
