<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Breach Checker</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a8fdc, #7b5dc9);
        }

        .top-btn {
            position: absolute;
            top: 20px;
            right: 30px;
        }

        .top-btn button {
            padding: 10px 18px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
        }

        .container {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            color: white;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
        }

        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input {
            width: 100%;
            max-width: 320px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            text-align: center;
            background: #f1f1f1;
            color: black;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: black;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 14px;
            white-space: pre-line;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            position: relative;
            color: black;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 22px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="top-btn">
        <button onclick="openModal()">Sign up for alerts</button>
    </div>

    <div class="container">
        <h1>Check if your data was breached</h1>

        <div class="form">
            <input
                id="emailInput"
                type="text"
                placeholder="Enter your email"
            >

            <button onclick="checkEmail()">Search</button>
        </div>

        <div id="result">
            Results will appear here
        </div>
    </div>

    <div class="modal" id="modal" onclick="outsideClick(event)">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>

            <h3>Sign up for breach alerts</h3>
            <p>Get notified if your data appears in future breaches.</p>

            <input
                id="alertEmailInput"
                type="email"
                placeholder="Enter your email"
            >

            <br><br>

            <button onclick="signup()">Sign up</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://brezjswsvwsqqexliiqm.supabase.co";

        const supabaseKey = "sb_publishable_GWh_LmIF1cmijNwNyQBxIw_ishu3Hf8";

        const supabaseClient = supabase.createClient(
            supabaseUrl,
            supabaseKey
        );

        async function checkEmail() {
            const email = document
                .getElementById("emailInput")
                .value
                .trim()
                .toLowerCase();

            const result = document.getElementById("result");

            if (email === "") {
                result.innerText = "Please enter an email.";
                return;
            }

            result.innerText = "Checking database...";

            const { data, error } = await supabaseClient
                .from("breach_records")
                .select("*")
                .eq("email", email);

            if (error) {
                result.innerText = "Error: " + error.message;
                console.log(error);
                return;
            }

            if (data.length > 0) {
                const breach = data[0];

                result.innerText =
                    "⚠ Breach Found\n\n" +
                    "Breach: " + breach.breach_name + "\n" +
                    "Year: " + breach.breach_year + "\n" +
                    "Risk Level: " + breach.risk_level + "\n" +
                    "Description: " + breach.description;
            } else {
                result.innerText = "No breaches found.";
            }
        }

        function openModal() {
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        function outsideClick(event) {
            if (event.target.id === "modal") {
                closeModal();
            }
        }

        async function signup() {
            const email = document
                .getElementById("alertEmailInput")
                .value
                .trim()
                .toLowerCase();

            if (email === "") {
                alert("Please enter an email.");
                return;
            }

            const { error } = await supabaseClient
                .from("alert_signups")
                .insert([
                    {
                        email: email
                    }
                ]);

            if (error) {
                alert("Error: " + error.message);
                console.log(error);
                return;
            }

            alert("You are now signed up for alerts.");
            closeModal();
        }
    </script>

</body>
</html>
