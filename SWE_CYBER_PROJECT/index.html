<!DOCTYPE html>
<html lang="en">
<head>
    <title>Data Breach Checker</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a8fdc, #7b5dc9);
        }

        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            color: white;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
        }

        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            text-align: center;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        input::placeholder {
            color: #999;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: black;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        #result {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Check if your data was breached</h1>

        <div class="form">
            <input type="text" placeholder="Enter your email">
            <button>Search</button>
        </div>

        <div id="result">
            Results will appear here
        </div>
    </div>
</body>
</html>
